<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{borrow.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-box-arrow-up-right"></i> <span th:text="#{borrow.title}">Borrow Asset</span>
                    </h4>
                </div>
                <div class="card-body p-4">

                    <!-- Flash messages -->
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="#{${successMessage}}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="#{${errorMessage}}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/movements/borrow}" method="post">

                        <!-- Asset -->
                        <div class="mb-3">
                            <label for="assetId" class="form-label" th:text="#{borrow.selectAsset}">Select Available Asset *</label>
                            <select id="assetId" name="assetId" class="form-select" required>
                                <option value="" th:text="#{borrow.selectAsset.placeholder}">-- Choose an asset --</option>
                                <option th:each="a : ${availableAssets}"
                                        th:value="${a.id}"
                                        th:text="${a.inventoryNumber + ' — ' + a.modelName}"
                                        th:selected="${a.id == selectedAssetId}"></option>
                            </select>
                        </div>

                        <!-- User -->
                        <div class="mb-3">
                            <label for="username" class="form-label" th:text="#{borrow.assignUser}">Assign to User *</label>
                            <select id="username" name="username" class="form-select" required>
                                <option value="" th:text="#{borrow.assignUser.placeholder}">-- Choose a user --</option>
                                <option th:each="u : ${users}"
                                        th:value="${u.username}"
                                        th:text="${u.fullName + ' (' + #messages.msg('enum.Role.' + u.role) + ')'}"></option>
                            </select>
                        </div>

                        <!-- Borrowed Date -->
                        <div class="mb-3">
                            <label for="borrowedDate" class="form-label" th:text="#{borrow.borrowedDate}">Borrowed Date *</label>
                            <input type="date" id="borrowedDate" name="borrowedDate"
                                   class="form-control" required
                                   th:min="${T(java.time.LocalDate).now()}"
                                   onchange="document.getElementById('expectedReturnDate').min = this.value;"/>
                            <div class="form-text" th:text="#{borrow.borrowedDate.hint}">Select the borrow date. Future dates will schedule the borrow.</div>
                        </div>

                        <!-- Expected Return Date -->
                        <div class="mb-3">
                            <label for="expectedReturnDate" class="form-label" th:text="#{borrow.expectedReturnDate}">Expected Return Date *</label>
                            <input type="date" id="expectedReturnDate" name="expectedReturnDate"
                                   class="form-control" required
                                   th:min="${T(java.time.LocalDate).now()}"/>
                            <div class="form-text" th:text="#{borrow.expectedReturnDate.hint}">Select when you plan to return the asset.</div>
                        </div>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg"></i> <span th:text="#{borrow.submit}">Confirm Borrow</span>
                            </button>
                            <a th:href="@{/movements}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> <span th:text="#{borrow.cancel}">Cancel</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
