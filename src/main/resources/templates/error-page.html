<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{error.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="card shadow border-danger">
                <div class="card-body p-5">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem"></i>
                    <h2 class="mt-3" th:text="#{error.title}">Something went wrong</h2>
                    <p class="text-muted mt-2"
                       th:text="${errorMessage} ?: #{error.defaultMessage}"></p>
                    <a th:href="@{/}" class="btn btn-primary mt-3">
                        <i class="bi bi-house"></i> <span th:text="#{error.backHome}">Back to Dashboard</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
