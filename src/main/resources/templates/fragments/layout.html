<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">School Inventory</title>
    <!-- Prevent flash of unstyled theme -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <script>
        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.classList.replace('bi-eye-slash', 'bi-eye');
            } else {
                input.type = 'password';
                iconElement.classList.replace('bi-eye', 'bi-eye-slash');
            }
        }
    </script>
</head>
<body>

<!-- ─── Navbar Fragment ─── -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-box-seam"></i> <span th:text="#{nav.brand}">School Inventory</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-speedometer2"></i> <span th:text="#{nav.dashboard}">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/assets}">
                        <i class="bi bi-collection"></i> <span th:text="#{nav.assets}">Assets</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/movements}">
                        <i class="bi bi-arrow-left-right"></i> <span th:text="#{nav.movements}">Movements</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/movements/my-items}">
                        <i class="bi bi-person-badge"></i> <span th:text="#{nav.myItems}">My Items</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">
                    <a class="nav-link text-warning" th:href="@{/movements/pending}">
                        <i class="bi bi-inbox"></i> <span th:text="#{nav.pending}">Pending Requests</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-danger" th:href="@{/admin}">
                        <i class="bi bi-shield-lock"></i> <span th:text="#{nav.admin}">Admin Panel</span>
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav align-items-center" sec:authorize="isAuthenticated()">
                <!-- Language Switcher -->
                <li class="nav-item me-2">
                    <a th:href="@{''(lang='bg')}" class="btn btn-outline-light btn-sm rounded-pill lang-btn"
                       th:if="${#locale.language == 'en'}" title="Превключи на български">
                        🇧🇬 BG
                    </a>
                    <a th:href="@{''(lang='en')}" class="btn btn-outline-light btn-sm rounded-pill lang-btn"
                       th:if="${#locale.language != 'en'}" title="Switch to English">
                        🇬🇧 EN
                    </a>
                </li>
                <!-- Theme Switcher -->
                <li class="nav-item me-3">
                    <button id="themeToggle" class="btn btn-outline-light btn-sm rounded-circle d-flex align-items-center justify-content-center p-0" style="width: 34px; height: 34px;" th:title="#{nav.toggleTheme}">
                        <i class="bi bi-moon-fill" id="themeIcon"></i>
                    </button>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light me-2" th:href="@{/profile}">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm mt-1">
                            <i class="bi bi-box-arrow-right"></i> <span th:text="#{nav.logout}">Logout</span>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ─── Footer Fragment ─── -->
<footer th:fragment="footer">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            
            if (themeToggle) {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'light') {
                    themeIcon.classList.replace('bi-moon-fill', 'bi-sun-fill');
                }
                
                themeToggle.addEventListener('click', () => {
                    let theme = document.documentElement.getAttribute('data-theme');
                    if (theme === 'dark' || !theme) {
                        document.documentElement.setAttribute('data-theme', 'light');
                        localStorage.setItem('theme', 'light');
                        themeIcon.classList.replace('bi-moon-fill', 'bi-sun-fill');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        themeIcon.classList.replace('bi-sun-fill', 'bi-moon-fill');
                    }
                });
            }
        });
    </script>
</footer>

</body>
</html>
